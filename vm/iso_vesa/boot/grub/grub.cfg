set timeout=3
set default=0

menuentry "Mac OS System 7.1 - 640x480 VESA" {
    insmod all_video
    set gfxmode=640x480x32
    set gfxpayload=keep
    multiboot /boot/MacOS71_VESA.elf
    boot
}

menuentry "Mac OS System 7.1 - 800x600 VESA" {
    insmod all_video
    set gfxmode=800x600x32
    set gfxpayload=keep
    multiboot /boot/MacOS71_VESA.elf
    boot
}

menuentry "Mac OS System 7.1 - 1024x768 VESA" {
